<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!-- viewport-fit=cover is REQUIRED for env(safe-area-inset-*) to resolve to
		     non-zero values on iPhone. Without it, every safe-area inset reads as 0px
		     and the bottom nav gets covered by the home indicator. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />

		<!-- iOS PWA standalone-mode meta tags. theme-color tints the iOS status bar; -->
		<!-- black-translucent makes the page extend under the status bar (combine with -->
		<!-- safe-area-inset-top padding on the top app bar). -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="LogueOS" />
		<meta name="theme-color" content="#0d1117" />
		<meta name="text-scale" content="scale" />

		<!-- iOS still uses apple-touch-icon alongside the manifest's icons array. -->
		<!-- 180x180 PNG, served from /static. -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<!-- Manifest link moved to +layout.svelte — terminal routes need to swap
		     it for a per-session manifest so "Add to Home Screen" lands on the
		     right URL instead of /console. -->
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400;1,600&family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
