<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <!-- Soft Glow Filter for the Central Pink Core (Elegant & Balanced) -->
    <filter id="pink-glow-subtle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Deep Ambient Drop Shadow to Lift the Crystal Star off the Slate & Webbing Background -->
    <filter id="star-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#010307" flood-opacity="0.95" />
    </filter>

    <!-- Subtle Drop Shadow to Anchor the Webbing to the Deep Backplate -->
    <filter id="wireframe-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#02040a" flood-opacity="0.7" />
    </filter>

    <!-- Linear Gradient for Star Outline (Vibrant Violet-to-Purple-to-Pink) -->
    <linearGradient id="purple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c5a5ff" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ff0055" />
    </linearGradient>

    <!-- Specular Highlight Gradient for the Star's Inner Bevel Edge -->
    <linearGradient id="star-highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.08" />
    </linearGradient>

    <!-- Linear Gradient for Webbing & Concentric Rings in the Background -->
    <linearGradient id="violet-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>

    <!-- Volumetric Radial Glass Highlight Fill inside the Star (Offsets light to top-left) -->
    <radialGradient id="facet-fill" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#c5a5ff" stop-opacity="0.10" />
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0" />
    </radialGradient>

    <!-- Radial Ambient Shadow Overlay behind everything -->
    <radialGradient id="inner-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Deep Slate-Blue Console Background App Squircle -->
  <rect width="512" height="512" rx="128" fill="#0d1117" />

  <!-- Ambient Shadow Layer behind everything to separate it from the deep background -->
  <circle cx="256" cy="256" r="160" fill="url(#inner-shadow)" opacity="0.9" />

  <!-- ═════════════════════════════════════════════════════════════════
       BACKGROUND LAYER 1: WEBBING & CONCENTRIC RING (DRAWN FIRST)
       ═════════════════════════════════════════════════════════════════ -->
  <!-- Webbing and concentric circle are placed in the background. The thick
       star outline will overlay and cleanly mask their outer segments. -->
  <g filter="url(#wireframe-shadow)">
    <!-- Diagonal Alignment Struts (Star tips to Concentric Ring) -->
    <path 
      d="M 142 142 L 188 188 M 370 142 L 324 188 M 142 370 L 188 324 M 370 370 L 324 324" 
      stroke="url(#violet-gradient)" 
      stroke-width="4.8" 
      stroke-linecap="round"
      opacity="0.8"
    />

    <!-- Cardinal Valley Ticks (Pointing outwards from Concentric Ring) -->
    <path 
      d="M 256 160 L 256 120 M 256 352 L 256 392 M 160 256 L 120 256 M 352 256 L 392 256" 
      stroke="url(#violet-gradient)" 
      stroke-width="4.8" 
      stroke-linecap="round"
      opacity="0.8"
    />
    
    <!-- Concentric Inner Circle (Framing the clear space around the core) -->
    <circle 
      cx="256" 
      cy="256" 
      r="96" 
      fill="none" 
      stroke="url(#violet-gradient)" 
      stroke-width="4.8" 
      stroke-dasharray="8,8" 
      opacity="0.7"
    />
  </g>

  <!-- ═════════════════════════════════════════════════════════════════
       FOREGROUND LAYER: ROTATED SPARKLE STAR (OVERLAYS WEBBING)
       ═════════════════════════════════════════════════════════════════ -->
  <!-- Rotated 45 degrees so points align diagonally. Sits in front of the 
       webbing lines, masking their outer joints for absolute geometric cleanliness.
       Projects a deep 12px drop shadow onto the webbing and background. -->
  <g transform="rotate(45, 256, 256)" filter="url(#star-shadow)">
    <!-- Filled star backplate with a curved volumetric radial highlight -->
    <path 
      d="M 256 80 Q 256 256 432 256 Q 256 256 256 432 Q 256 256 80 256 Q 256 256 256 80 Z" 
      fill="url(#facet-fill)"
    />
    
    <!-- Thick Outer Border (12px for high-contrast impact) -->
    <path 
      d="M 256 80 Q 256 256 432 256 Q 256 256 256 432 Q 256 256 80 256 Q 256 256 256 80 Z" 
      fill="none" 
      stroke="url(#purple-gradient)" 
      stroke-width="12" 
      stroke-linejoin="round" 
      stroke-linecap="round"
    />

    <!-- Thin Specular Bevel Line (3px for high-gloss reflection) -->
    <path 
      d="M 256 84 Q 256 256 428 256 Q 256 256 256 428 Q 256 256 84 256 Q 256 256 256 84 Z" 
      fill="none" 
      stroke="url(#star-highlight)" 
      stroke-width="3" 
      stroke-linejoin="round" 
      stroke-linecap="round"
      opacity="0.85"
    />

    <!-- Sparkling Accent Dots at the four diagonal tips -->
    <circle cx="256" cy="48" r="5.5" fill="#c5a5ff" />
    <circle cx="256" cy="464" r="5.5" fill="#6d28d9" />
    <circle cx="48" cy="256" r="5.5" fill="#8b5cf6" />
    <circle cx="464" cy="256" r="5.5" fill="#ff0055" />
  </g>

  <!-- ═════════════════════════════════════════════════════════════════
       FOCAL POINT: VOLUMETRIC GLOWING AGENT CORE
       ═════════════════════════════════════════════════════════════════ -->
  <!-- Multi-layered glowing core centered in the hollow cockpit, floating above all layers -->
  <!-- Layer 1: Ambient soft outer glow backdrop -->
  <circle cx="256" cy="256" r="24" fill="#f43f5e" opacity="0.35" filter="url(#pink-glow-subtle)" />
  <!-- Layer 2: Highly concentrated sharp core -->
  <circle cx="256" cy="256" r="15" fill="#f43f5e" filter="url(#pink-glow-subtle)" />
  <!-- Layer 3: High-contrast light reflection spot -->
  <circle cx="251" cy="251" r="4" fill="#ffe4e6" opacity="0.9" />
</svg>
